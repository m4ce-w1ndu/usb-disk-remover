name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --locked

      - name: Create Release Bundle
        shell: pwsh
        run: |
          # 1. Get the tag name (e.g., v1.0.0)
          $VERSION = "${{ github.ref_name }}"
          $PROJECT_NAME = "your-project-name"
          $ZIP_NAME = "$PROJECT_NAME-$VERSION.zip"

          # 2. Create bundle folder
          mkdir bundle

          # 3. Copy files (Assumes binary name matches project name)
          cp "target/release/$PROJECT_NAME.exe" bundle/
          cp "README.md" bundle/

          # 4. Zip it up
          7z a $ZIP_NAME ./bundle/*

          # 5. Store the filename for the next step
          echo "ZIP_PATH=$ZIP_NAME" >> $env:GITHUB_ENV

      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env:ZIP_PATH }}
          asset_name: ${{ env:ZIP_PATH }}
          tag: ${{ github.ref }}
          overwrite: true
